stages:
 - build
 - deploy

build:
 stage: build
 tags:
  - danhba
 variables:
  GIT_STRATEGY: clone
 script:
    - echo " Building the docker image"
    - echo " Building the backend image"
    - cd backend/
    - docker build -t danhba-backend:lastest .
    - cd ..
    - echo " Building the frontend images"
    - cd frontend/
    - docker build -t danhba-frontend:lastest .
    - echo " Done building the docker images"
deploy:
 stage: deploy
 tags:
  - danhba
 variables:
  GIT_STRATEGY: none
 script:
    - echo " Deploying the docker images"
    - echo " Deploying the backend image"
    - docker run -d --name danhba-backend -p 8059:8059 danhba-backend:lastest
    - echo " Deploying the frontend image"
    - docker run -d --name danhba-frontend -p 80:80 danhba-frontend:lastest
    - echo " Done deploying the docker images"